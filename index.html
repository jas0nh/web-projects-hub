<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Web Projects Hub</title>
    <meta
      name="description"
      content="Jason 的公开网页项目入口，集中访问已发布到互联网的静态站点、工具和常用平台。"
    >
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="topbar" aria-label="主要导航">
        <a class="brand" href="#top" aria-label="Web Projects Hub home">
          <span class="brand-mark"></span>
          <span>Web Hub</span>
        </a>
        <div class="nav-links">
          <a href="#projects">公开项目</a>
          <a href="#tools">互联网工具</a>
          <a href="https://github.com/jas0nh" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </nav>

      <div id="top" class="intro">
        <div>
          <p class="eyebrow">Public web index</p>
          <h1>公开网页入口</h1>
        </div>
        <p>
          只收录可直接从互联网访问且有内容的页面；不放 LAN、Tailnet、localhost 或需要端口转发的服务。
        </p>
      </div>
    </header>

    <main>
      <section id="projects" class="section">
        <div class="section-header">
          <h2>自建公开项目 <span id="projectCount">0</span></h2>
          <p>GitHub Pages 和 Cloudflare Pages 上已经能直接访问的网页。</p>
        </div>
        <div id="projectGrid" class="link-grid"></div>
      </section>

      <section id="tools" class="section section--alt">
        <div class="section-header">
          <h2>公网工具入口 <span id="toolCount">0</span></h2>
          <p>从 HomePage 的外部链接中抽出的互联网可访问项目和平台。</p>
        </div>
        <div id="toolGrid" class="link-grid link-grid--compact"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Only public URLs. No local probes, no tracking, no account data.</span>
      <a href="https://github.com/jas0nh/web-projects-hub" target="_blank" rel="noreferrer">Repository</a>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
